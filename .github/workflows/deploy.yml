name: Deploy to VPS via SSH

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            # Set up error handling
            set -e

            # Use ~/mivax-cred as the base directory
            mkdir -p ~/mivax-cred
            cd ~/mivax-cred

            # Clone the repository if it doesn't exist in the current directory
            if [ ! -d ".git" ]; then
              echo "Repository not found, cloning into current directory..."
              git clone git@github.com:Marvellye/mivax-cred.git .
            fi

            echo "Updating repository..."
            git fetch origin
            git reset --hard origin/${{ github.ref_name }}

            echo "Installing dependencies..."
            # Use npm ci for clean production install if package-lock.json exists, otherwise npm install
            npm ci || npm install

            echo "Installing Playwright browsers..."
            npx playwright install chromium

            echo "Restarting app with PM2..."
            # Use index.js as the entry point
            pm2 restart mivax-cred || pm2 start index.js --name mivax-cred
